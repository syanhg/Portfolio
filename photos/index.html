<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Seungyong (Alex) Yang</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="photos.css">
</head>
<body>
    <div class="container">
        <div class="photos-header">
            <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>
            <div class="view-toggle">
                <button class="view-btn active" id="btn-carousel" onclick="setView('carousel')" title="Carousel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3v18"/><rect width="12" height="18" x="6" y="3" rx="2"/><path d="M22 3v18"/></svg>
                </button>
                <button class="view-btn" id="btn-grid" onclick="setView('grid')" title="All at once">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2h18"/><rect width="18" height="12" x="3" y="6" rx="2"/><path d="M3 22h18"/></svg>
                </button>
            </div>
        </div>

        <div class="carousel" id="view-carousel">
            <div class="carousel-track" id="carousel-track" style="animation-play-state:paused">
                <div class="skeleton skeleton-carousel-item"></div>
                <div class="skeleton skeleton-carousel-item"></div>
                <div class="skeleton skeleton-carousel-item"></div>
                <div class="skeleton skeleton-carousel-item"></div>
            </div>
        </div>
        <div class="photos-grid" id="view-grid" style="display:none">
            <div class="skeleton skeleton-grid-item"></div>
            <div class="skeleton skeleton-grid-item"></div>
            <div class="skeleton skeleton-grid-item"></div>
            <div class="skeleton skeleton-grid-item"></div>
        </div>

        <div class="nav">
            <a href="../home"     class="nav-btn">home<span class="arrow">→</span></a>
            <a href="../quotes"   class="nav-btn">quotes<span class="arrow">→</span></a>
            <a href="../thoughts" class="nav-btn">thoughts<span class="arrow">→</span></a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <button class="close-btn" onclick="closeLightbox()"></button>
        <img id="lightboxImg" src="" alt="">
        <p id="lightboxCaption"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="photos.js"></script>
    <script src="../nav.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://wzzyinimajfxuueywxdy.supabase.co',
            'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
        );

        function setView(mode) {
            const carousel = document.getElementById('view-carousel');
            const grid     = document.getElementById('view-grid');
            const btnC     = document.getElementById('btn-carousel');
            const btnG     = document.getElementById('btn-grid');
            const [outEl, inEl] = mode === 'carousel' ? [grid, carousel] : [carousel, grid];

            btnC.classList.toggle('active', mode === 'carousel');
            btnG.classList.toggle('active', mode === 'grid');

            outEl.classList.add('view-hidden');
            outEl.addEventListener('transitionend', function hide() {
                outEl.style.display = 'none';
                outEl.classList.remove('view-hidden');
                outEl.removeEventListener('transitionend', hide);

                inEl.style.display = mode === 'grid' ? '' : '';
                inEl.style.opacity = '0';
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => { inEl.style.opacity = ''; });
                });
            }, { once: true });
        }

        async function loadPhotos() {
            const [{ data: files }, { data: photosData }] = await Promise.all([
                sb.storage.from('photos').list('', { sortBy: { column: 'created_at', order: 'asc' } }),
                sb.from('photos').select('filename, caption')
            ]);
            if (!files?.length) return;

            const captionMap = {};
            photosData?.forEach(p => captionMap[p.filename] = p.caption);

            const photoList = files.map(f => ({
                url:     sb.storage.from('photos').getPublicUrl(f.name).data.publicUrl,
                caption: captionMap[f.name] || ''
            }));

            setImages(photoList);

            // Carousel
            const track   = document.getElementById('carousel-track');
            track.style.animationPlayState = '';
            const doubled = [...photoList, ...photoList];
            track.innerHTML = doubled.map((p, i) =>
                `<img src="${p.url}" alt="" onclick="openLightbox(${i % photoList.length})">`
            ).join('');

            const oneSetWidth = photoList.length * (300 + 15);
            const style = document.createElement('style');
            style.textContent = `@keyframes slide { from { transform: translateX(0); } to { transform: translateX(-${oneSetWidth}px); } }`;
            document.head.appendChild(style);

            // Grid
            const gridEl = document.getElementById('view-grid');
            gridEl.innerHTML = photoList.map((p, i) =>
                `<img src="${p.url}" alt="" onclick="openLightbox(${i})">`
            ).join('');
        }

        loadPhotos();
    </script>
</body>
</html>
