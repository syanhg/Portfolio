<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Seungyong (Alex) Yang</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="photos.css">
</head>
<body>
    <div class="container">
        <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>

        <div class="carousel">
            <div class="carousel-track" id="carousel-track"></div>
        </div>

        <div class="nav">
            <a href="../home"     class="nav-btn">home<span class="arrow">→</span></a>
            <a href="../quotes"   class="nav-btn">quotes<span class="arrow">→</span></a>
            <a href="../thoughts" class="nav-btn">thoughts<span class="arrow">→</span></a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <button class="close-btn" onclick="closeLightbox()"></button>
        <img id="lightboxImg" src="" alt="">
        <p id="lightboxCaption"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="photos.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://wzzyinimajfxuueywxdy.supabase.co',
            'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
        );

        async function loadCarousel() {
            const [{ data: files }, { data: photosData }] = await Promise.all([
                sb.storage.from('photos').list('', { sortBy: { column: 'created_at', order: 'asc' } }),
                sb.from('photos').select('filename, caption')
            ]);
            if (!files?.length) return;

            const captionMap = {};
            photosData?.forEach(p => captionMap[p.filename] = p.caption);

            const photoList = files.map(f => ({
                url:     sb.storage.from('photos').getPublicUrl(f.name).data.publicUrl,
                caption: captionMap[f.name] || ''
            }));

            setImages(photoList);

            const track    = document.getElementById('carousel-track');
            const doubled  = [...photoList, ...photoList];
            track.innerHTML = doubled.map((p, i) =>
                `<img src="${p.url}" alt="" onclick="openLightbox(${i % photoList.length})">`
            ).join('');

            const oneSetWidth = photoList.length * (300 + 15);
            const style = document.createElement('style');
            style.textContent = `@keyframes slide { from { transform: translateX(0); } to { transform: translateX(-${oneSetWidth}px); } }`;
            document.head.appendChild(style);
        }

        loadCarousel();
    </script>
</body>
</html>
