<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotes - Seungyong (Alex) Yang</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>

        <div id="quotes"></div>

        <div class="nav">
            <a href="../home"     class="nav-btn">home<span class="arrow">→</span></a>
            <a href="../photos"   class="nav-btn">photos<span class="arrow">→</span></a>
            <a href="../thoughts" class="nav-btn">thoughts<span class="arrow">→</span></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://wzzyinimajfxuueywxdy.supabase.co',
            'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
        );

        async function load() {
            const el = document.getElementById('quotes');
            const { data: quotes, error } = await sb
                .from('quotes')
                .select('*')
                .order('created_at', { ascending: true });

            if (error || !quotes?.length) {
                el.innerHTML = '<div class="quote-item"><span class="quote-number">—</span><p class="quote-text">No quotes yet.</p></div>';
                return;
            }

            el.innerHTML = quotes.map((q, i) => `
                <div class="quote-item">
                    <span class="quote-number">${String(i + 1).padStart(2, '0')}</span>
                    <p class="quote-text">${q.text}${q.author ? ` — ${q.author}` : ''}</p>
                </div>
            `).join('');
        }

        load();
    </script>
    <script src="../nav.js"></script>
</body>
</html>
