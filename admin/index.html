<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        input[type="text"], input[type="password"], input[type="email"], input[type="date"], textarea {
            font-family: inherit;
            font-size: 16px;
            color: #666;
            border: 1px solid #ccc;
            background: transparent;
            padding: 4px 8px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: #666; }
        textarea { height: 280px; resize: vertical; line-height: 1.6; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 12px; color: #bbb; display: block; margin-bottom: 4px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .row input { flex: 1; }
        .post-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 15px;
        }
        .post-line:hover { color: #444; }
        .post-line.active { color: #333; }
        .post-line span.dt { font-size: 12px; color: #ccc; }
        #status { font-size: 13px; margin-top: 10px; min-height: 18px; }
        #status.ok  { color: #5a9; }
        #status.err { color: #c55; }
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #auth-box { display: flex; flex-direction: column; gap: 8px; }
        #auth-box input { width: 240px; }
        #auth-error { font-size: 13px; color: #c55; min-height: 18px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-label { font-size: 12px; color: #bbb; }
        #signout-btn { font-size: 12px; color: #bbb; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
        #signout-btn:hover { color: #666; }
    </style>
</head>
<body>

<!-- Login screen -->
<div id="auth-screen">
    <div id="auth-box">
        <input type="email"    id="email"    placeholder="email" autofocus>
        <input type="password" id="password" placeholder="password">
        <button class="nav-btn" id="login-btn">sign in<span class="arrow">→</span></button>
        <div id="auth-error"></div>
    </div>
</div>

<!-- Admin panel -->
<div id="admin" style="display:none" class="container">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:40px;">
        <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>
        <button id="signout-btn" onclick="signOut()">sign out</button>
    </div>

    <!-- Post list -->
    <div style="margin-bottom:30px;">
        <div class="section-header">
            <span class="section-label">posts</span>
            <button class="nav-btn" onclick="newPost()">new post<span class="arrow">→</span></button>
        </div>
        <div id="post-list"></div>
    </div>

    <!-- Editor -->
    <div id="editor" style="display:none; margin-bottom:30px;">
        <div class="field">
            <label>title</label>
            <input type="text" id="post-title" placeholder="Title">
        </div>
        <div class="field">
            <label>date</label>
            <input type="date" id="post-date">
        </div>
        <div class="field">
            <label>body</label>
            <textarea id="post-body" placeholder="Write your thoughts..."></textarea>
        </div>
        <div class="row">
            <button class="nav-btn" onclick="save()">publish<span class="arrow">→</span></button>
            <button class="nav-btn" id="delete-btn" onclick="remove()" style="display:none">delete<span class="arrow">→</span></button>
        </div>
        <div id="status"></div>
    </div>

    <div class="nav">
        <a href="../home"     class="nav-btn">home<span class="arrow">→</span></a>
        <a href="../thoughts" class="nav-btn">thoughts<span class="arrow">→</span></a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const sb = supabase.createClient(
        'https://wzzyinimajfxuueywxdy.supabase.co',
        'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
    );

    let currentId = null;
    let posts = [];

    // Check existing session on load
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) showAdmin();
    });

    // Login
    document.getElementById('login-btn').onclick = login;
    ['email', 'password'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    });

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl    = document.getElementById('auth-error');
        errEl.textContent = '';
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errEl.textContent = error.message; return; }
        showAdmin();
    }

    async function signOut() {
        await sb.auth.signOut();
        location.reload();
    }

    function showAdmin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin').style.display = 'block';
        loadPosts();
    }

    // CRUD
    async function loadPosts() {
        const { data, error } = await sb.from('posts').select('*').order('date', { ascending: false });
        if (error) { setStatus('Load failed: ' + error.message, 'err'); return; }
        posts = data || [];
        renderList();
    }

    function renderList() {
        const el = document.getElementById('post-list');
        if (!posts.length) {
            el.innerHTML = '<p style="font-size:14px;color:#ccc;">No posts yet</p>';
            return;
        }
        el.innerHTML = posts.map(p => `
            <div class="post-line ${p.id === currentId ? 'active' : ''}" onclick="editPost('${p.id}')">
                <span>${p.title || '(untitled)'}</span>
                <span class="dt">${p.date}</span>
            </div>
        `).join('');
    }

    function newPost() {
        currentId = null;
        document.getElementById('post-title').value = '';
        document.getElementById('post-date').value = new Date().toISOString().slice(0, 10);
        document.getElementById('post-body').value = '';
        document.getElementById('delete-btn').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        setStatus('');
        renderList();
        document.getElementById('post-title').focus();
    }

    function editPost(id) {
        const post = posts.find(p => p.id === id);
        if (!post) return;
        currentId = id;
        document.getElementById('post-title').value = post.title;
        document.getElementById('post-date').value = post.date;
        document.getElementById('post-body').value = post.body;
        document.getElementById('delete-btn').style.display = 'inline-flex';
        document.getElementById('editor').style.display = 'block';
        setStatus('');
        renderList();
    }

    async function save() {
        const title = document.getElementById('post-title').value.trim();
        const date  = document.getElementById('post-date').value;
        const body  = document.getElementById('post-body').value.trim();
        if (!title || !body) { setStatus('Title and body required', 'err'); return; }
        setStatus('Saving…', '');

        const payload = { title, date, body };
        const { error } = currentId
            ? await sb.from('posts').update(payload).eq('id', currentId)
            : await sb.from('posts').insert(payload);

        if (error) { setStatus('Error: ' + error.message, 'err'); return; }
        setStatus('Published!', 'ok');
        await loadPosts();
    }

    async function remove() {
        if (!currentId || !confirm('Delete this post?')) return;
        setStatus('Deleting…', '');
        const { error } = await sb.from('posts').delete().eq('id', currentId);
        if (error) { setStatus('Error: ' + error.message, 'err'); return; }
        currentId = null;
        document.getElementById('editor').style.display = 'none';
        setStatus('Deleted', 'ok');
        await loadPosts();
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type || '';
    }
</script>
</body>
</html>
