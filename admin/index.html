<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        #admin.container { width: min(800px, calc(100vw - 80px)); }
        input[type="text"], input[type="password"], input[type="email"], input[type="date"], textarea {
            font-family: inherit;
            font-size: 16px;
            color: #666;
            border: 1px solid #ccc;
            background: transparent;
            padding: 4px 8px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: #666; }
        textarea { height: 280px; resize: vertical; line-height: 1.6; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 12px; color: #bbb; display: block; margin-bottom: 4px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .post-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 15px;
        }
        .post-line:hover { color: #444; }
        .post-line.active { color: #333; }
        .post-line span.dt { font-size: 12px; color: #ccc; flex-shrink: 0; margin-left: 12px; }
        .status-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
        .status-msg.ok  { color: #5a9; }
        .status-msg.err { color: #c55; }
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #auth-box { display: flex; flex-direction: column; gap: 8px; }
        #auth-box input { width: 240px; }
        #auth-error { font-size: 13px; color: #c55; min-height: 18px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-label { font-size: 12px; color: #bbb; }
        #signout-btn { font-size: 12px; color: #bbb; cursor: pointer; background: none; border: none; font-family: inherit; padding: 0; }
        #signout-btn:hover { color: #666; }
        .tabs { display: flex; gap: 20px; margin-bottom: 30px; }
        .tab-btn { background: none; border: none; font-family: inherit; font-size: 16px; color: #bbb; cursor: pointer; padding: 0; }
        .tab-btn.active { color: #666; }
        .tab-btn:hover { color: #666; }
        /* Photo grid */
        .photo-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        .photo-thumb { position: relative; width: 120px; }
        .photo-thumb img { width: 100%; height: 80px; object-fit: cover; display: block; }
        .photo-thumb input[type="text"] {
            width: 100%;
            font-size: 11px;
            padding: 2px 4px;
            border: none;
            border-bottom: 1px solid #eee;
            box-sizing: border-box;
            color: #999;
        }
        .photo-thumb button {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 20px; height: 20px;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .photo-thumb button:hover { background: rgba(0,0,0,0.8); }
        input[type="file"] { border: none; padding: 0; font-size: 14px; color: #999; width: 100%; box-sizing: border-box; }
        #post-body {
            font-family: inherit;
            font-size: 16px;
            color: #666;
            border: 1px solid #ccc;
            background: transparent;
            padding: 4px 8px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            min-height: 280px;
            line-height: 1.6;
            overflow-y: auto;
            overflow-wrap: break-word;
            word-break: break-word;
            white-space: pre-wrap;
        }
        #post-body:focus { border-color: #666; }
        #post-body:empty:before { content: attr(placeholder); color: #bbb; pointer-events: none; }
    </style>
</head>
<body>

<!-- Login screen -->
<div id="auth-screen">
    <div id="auth-box">
        <input type="email"    id="email"    placeholder="email" autofocus>
        <input type="password" id="password" placeholder="password">
        <button class="nav-btn" id="login-btn">sign in<span class="arrow">→</span></button>
        <div id="auth-error"></div>
    </div>
</div>

<!-- Admin panel -->
<div id="admin" style="display:none" class="container">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:30px;">
        <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>
        <button id="signout-btn" onclick="signOut()">sign out</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('thoughts')">thoughts</button>
        <button class="tab-btn"        onclick="showTab('photos')">photos</button>
        <button class="tab-btn"        onclick="showTab('quotes')">quotes</button>
    </div>

    <!-- Thoughts tab -->
    <div id="tab-thoughts">
        <div style="margin-bottom:30px;">
            <div class="section-header">
                <span class="section-label">posts</span>
                <button class="nav-btn" onclick="newPost()">new post<span class="arrow">→</span></button>
            </div>
            <div id="post-list"></div>
        </div>

        <div id="editor" style="display:none; margin-bottom:30px;">
            <div class="field">
                <div id="post-body" contenteditable="true" placeholder="Write your thought..."></div>
            </div>
            <div class="field">
                <label>date</label>
                <input type="date" id="post-date">
            </div>
            <div class="row">
                <button class="nav-btn" onclick="save()">publish<span class="arrow">→</span></button>
                <button class="nav-btn" id="delete-btn" onclick="removePost()" style="display:none">delete<span class="arrow">→</span></button>
            </div>
            <div id="post-status" class="status-msg"></div>
        </div>
    </div>

    <!-- Photos tab -->
    <div id="tab-photos" style="display:none;">
        <div class="section-header">
            <span class="section-label">photos</span>
        </div>
        <div class="field">
            <label>image</label>
            <input type="file" id="photo-upload" accept="image/*">
        </div>
        <div class="field">
            <label>caption</label>
            <input type="text" id="photo-caption" placeholder="Optional caption">
        </div>
        <button class="nav-btn" onclick="uploadPhoto()">upload<span class="arrow">→</span></button>
        <div id="photo-status" class="status-msg"></div>
        <div id="photo-grid" class="photo-grid"></div>
    </div>

    <!-- Quotes tab -->
    <div id="tab-quotes" style="display:none;">
        <div style="margin-bottom:30px;">
            <div class="section-header">
                <span class="section-label">quotes</span>
                <button class="nav-btn" onclick="newQuote()">new quote<span class="arrow">→</span></button>
            </div>
            <div id="quote-list"></div>
        </div>

        <div id="quote-editor" style="display:none; margin-bottom:30px;">
            <div class="field">
                <textarea id="quote-text" placeholder="Quote text..." style="height:120px;"></textarea>
            </div>
            <div class="field">
                <label>author</label>
                <input type="text" id="quote-author" placeholder="Author">
            </div>
            <div class="row">
                <button class="nav-btn" onclick="saveQuote()">save<span class="arrow">→</span></button>
                <button class="nav-btn" id="quote-delete-btn" onclick="removeQuote()" style="display:none">delete<span class="arrow">→</span></button>
            </div>
            <div id="quote-status" class="status-msg"></div>
        </div>
    </div>

    <div class="nav" style="margin-top:40px;">
        <a href="../home"     class="nav-btn">home<span class="arrow">→</span></a>
        <a href="../thoughts" class="nav-btn">thoughts<span class="arrow">→</span></a>
        <a href="../photos"   class="nav-btn">photos<span class="arrow">→</span></a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const sb = supabase.createClient(
        'https://wzzyinimajfxuueywxdy.supabase.co',
        'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
    );

    let currentId = null;
    let posts = [];
    let activeTab = 'thoughts';

    sb.auth.getSession().then(({ data: { session } }) => { if (session) showAdmin(); });

    document.getElementById('login-btn').onclick = login;
    ['email', 'password'].forEach(id =>
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); })
    );

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl    = document.getElementById('auth-error');
        errEl.textContent = '';
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { errEl.textContent = error.message; return; }
        showAdmin();
    }

    async function signOut() { await sb.auth.signOut(); location.reload(); }

    function showAdmin() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin').style.display = 'block';
        loadPosts();
    }

    function showTab(tab) {
        activeTab = tab;
        ['thoughts', 'photos', 'quotes'].forEach(t => {
            document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
        });
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', ['thoughts','photos','quotes'][i] === tab);
        });
        if (tab === 'photos') loadPhotos();
        if (tab === 'quotes') loadQuotes();
    }

    document.getElementById('post-body').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.execCommand('insertLineBreak');
            return;
        }
    });
    // ── Thoughts ────────────────────────────────────────────
    async function loadPosts() {
        const { data, error } = await sb.from('posts').select('*').order('date', { ascending: false });
        if (error) { setPostStatus('Load failed: ' + error.message, 'err'); return; }
        posts = data || [];
        renderList();
    }

    function stripHTML(html) {
        const d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || '';
    }

    function renderList() {
        const el = document.getElementById('post-list');
        if (!posts.length) { el.innerHTML = '<p style="font-size:14px;color:#ccc;">No posts yet</p>'; return; }
        el.innerHTML = posts.map(p => {
            const preview = stripHTML(p.body);
            return `
            <div class="post-line ${p.id === currentId ? 'active' : ''}" onclick="editPost('${p.id}')">
                <span>${preview.slice(0, 60)}${preview.length > 60 ? '…' : ''}</span>
                <span class="dt">${p.date}</span>
            </div>`;
        }).join('');
    }

    function setBodyHTML(html) {
        const el = document.getElementById('post-body');
        el.innerHTML = html.includes('<') ? html : html.replace(/\n/g, '<br>');
    }

    function getBodyHTML() {
        return document.getElementById('post-body').innerHTML.trim();
    }

    function newPost() {
        currentId = null;
        document.getElementById('post-date').value = new Date().toISOString().slice(0, 10);
        document.getElementById('post-body').innerHTML = '';
        document.getElementById('delete-btn').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        setPostStatus('');
        renderList();
        document.getElementById('post-body').focus();
    }

    function editPost(id) {
        const post = posts.find(p => p.id === id);
        if (!post) return;
        currentId = id;
        document.getElementById('post-date').value = post.date;
        setBodyHTML(post.body);
        document.getElementById('delete-btn').style.display = 'inline-flex';
        document.getElementById('editor').style.display = 'block';
        setPostStatus('');
        renderList();
    }

    async function save() {
        const date = document.getElementById('post-date').value;
        const body = getBodyHTML();
        if (!document.getElementById('post-body').textContent.trim()) { setPostStatus('Write something first', 'err'); return; }
        setPostStatus('Saving…', '');
        const payload = { date, body };
        const { error } = currentId
            ? await sb.from('posts').update(payload).eq('id', currentId)
            : await sb.from('posts').insert(payload);
        if (error) { setPostStatus('Error: ' + error.message, 'err'); return; }
        setPostStatus('Published!', 'ok');
        await loadPosts();
    }

    async function removePost() {
        if (!currentId || !confirm('Delete this post?')) return;
        setPostStatus('Deleting…', '');
        const { error } = await sb.from('posts').delete().eq('id', currentId);
        if (error) { setPostStatus('Error: ' + error.message, 'err'); return; }
        currentId = null;
        document.getElementById('editor').style.display = 'none';
        setPostStatus('Deleted', 'ok');
        await loadPosts();
    }

    function setPostStatus(msg, type) {
        const el = document.getElementById('post-status');
        el.textContent = msg;
        el.className = 'status-msg ' + (type || '');
    }

    // ── Photos ───────────────────────────────────────────────
    async function loadPhotos() {
        const [{ data: files, error }, { data: photosData }] = await Promise.all([
            sb.storage.from('photos').list('', { sortBy: { column: 'created_at', order: 'asc' } }),
            sb.from('photos').select('filename, caption')
        ]);
        const grid = document.getElementById('photo-grid');
        if (error || !files?.length) { grid.innerHTML = '<p style="font-size:14px;color:#ccc;">No photos yet</p>'; return; }
        const captionMap = {};
        photosData?.forEach(p => captionMap[p.filename] = p.caption);
        grid.innerHTML = files.map(f => {
            const url = sb.storage.from('photos').getPublicUrl(f.name).data.publicUrl;
            const cap = captionMap[f.name] || '';
            return `
                <div class="photo-thumb">
                    <img src="${url}" alt="${f.name}">
                    <button onclick="deletePhoto('${f.name}')">×</button>
                    <input type="text" value="${cap}" placeholder="caption"
                           onblur="updateCaption('${f.name}', this.value)"
                           onkeydown="if(event.key==='Enter') this.blur()">
                </div>`;
        }).join('');
    }

    async function uploadPhoto() {
        const input   = document.getElementById('photo-upload');
        const caption = document.getElementById('photo-caption').value.trim();
        const file    = input.files[0];
        if (!file) return;
        setPhotoStatus('Uploading…', '');
        const filename = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
        const { error } = await sb.storage.from('photos').upload(filename, file);
        if (error) { setPhotoStatus('Error: ' + error.message, 'err'); return; }
        await sb.from('photos').insert({ filename, caption });
        input.value = '';
        document.getElementById('photo-caption').value = '';
        setPhotoStatus('Uploaded!', 'ok');
        await loadPhotos();
    }

    async function updateCaption(filename, caption) {
        await sb.from('photos').upsert({ filename, caption }, { onConflict: 'filename' });
    }

    async function deletePhoto(filename) {
        if (!confirm('Delete this photo?')) return;
        await Promise.all([
            sb.storage.from('photos').remove([filename]),
            sb.from('photos').delete().eq('filename', filename)
        ]);
        setPhotoStatus('Deleted', 'ok');
        await loadPhotos();
    }

    function setPhotoStatus(msg, type) {
        const el = document.getElementById('photo-status');
        el.textContent = msg;
        el.className = 'status-msg ' + (type || '');
    }

    // ── Quotes ───────────────────────────────────────────────
    let quotes = [];
    let currentQuoteId = null;

    async function loadQuotes() {
        const { data, error } = await sb.from('quotes').select('*').order('created_at', { ascending: true });
        if (error) { setQuoteStatus('Load failed: ' + error.message, 'err'); return; }
        quotes = data || [];
        renderQuoteList();
    }

    function renderQuoteList() {
        const el = document.getElementById('quote-list');
        if (!quotes.length) { el.innerHTML = '<p style="font-size:14px;color:#ccc;">No quotes yet</p>'; return; }
        el.innerHTML = quotes.map((q, i) => `
            <div class="post-line ${q.id === currentQuoteId ? 'active' : ''}" onclick="editQuote('${q.id}')">
                <span>${q.text.slice(0, 60)}${q.text.length > 60 ? '…' : ''}</span>
                <span class="dt">${q.author || ''}</span>
            </div>
        `).join('');
    }

    function newQuote() {
        currentQuoteId = null;
        document.getElementById('quote-text').value   = '';
        document.getElementById('quote-author').value = '';
        document.getElementById('quote-delete-btn').style.display = 'none';
        document.getElementById('quote-editor').style.display = 'block';
        setQuoteStatus('');
        renderQuoteList();
        document.getElementById('quote-text').focus();
    }

    function editQuote(id) {
        const q = quotes.find(q => q.id === id);
        if (!q) return;
        currentQuoteId = id;
        document.getElementById('quote-text').value   = q.text;
        document.getElementById('quote-author').value = q.author || '';
        document.getElementById('quote-delete-btn').style.display = 'inline-flex';
        document.getElementById('quote-editor').style.display = 'block';
        setQuoteStatus('');
        renderQuoteList();
    }

    async function saveQuote() {
        const text   = document.getElementById('quote-text').value.trim();
        const author = document.getElementById('quote-author').value.trim();
        if (!text) { setQuoteStatus('Quote text required', 'err'); return; }
        setQuoteStatus('Saving…', '');
        const payload = { text, author };
        const { error } = currentQuoteId
            ? await sb.from('quotes').update(payload).eq('id', currentQuoteId)
            : await sb.from('quotes').insert(payload);
        if (error) { setQuoteStatus('Error: ' + error.message, 'err'); return; }
        setQuoteStatus('Saved!', 'ok');
        await loadQuotes();
    }

    async function removeQuote() {
        if (!currentQuoteId || !confirm('Delete this quote?')) return;
        setQuoteStatus('Deleting…', '');
        const { error } = await sb.from('quotes').delete().eq('id', currentQuoteId);
        if (error) { setQuoteStatus('Error: ' + error.message, 'err'); return; }
        currentQuoteId = null;
        document.getElementById('quote-editor').style.display = 'none';
        setQuoteStatus('Deleted', 'ok');
        await loadQuotes();
    }

    function setQuoteStatus(msg, type) {
        const el = document.getElementById('quote-status');
        el.textContent = msg;
        el.className = 'status-msg ' + (type || '');
    }
</script>
</body>
</html>
