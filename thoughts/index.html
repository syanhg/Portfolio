<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - Seungyong (Alex) Yang</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .post-body {
            margin-top: 8px;
            white-space: pre-wrap;
        }
        .post-date {
            font-size: 12px;
            color: #bbb;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>

        <div id="posts"></div>

        <div class="nav">
            <a href="../home" class="nav-btn">home<span class="arrow">→</span></a>
            <a href="../quotes" class="nav-btn">quotes<span class="arrow">→</span></a>
            <a href="../photos" class="nav-btn">photos<span class="arrow">→</span></a>
        </div>
    </div>
    <script>
        fetch('../posts.json')
            .then(r => r.json())
            .then(posts => {
                const el = document.getElementById('posts');
                if (!posts.length) {
                    el.innerHTML = '<div class="quote-item"><span class="quote-number">—</span><p class="quote-text">No thoughts yet.</p></div>';
                    return;
                }
                el.innerHTML = [...posts].reverse().map((post, i) => `
                    <div class="quote-item">
                        <span class="quote-number">${String(posts.length - i).padStart(2, '0')}</span>
                        <div>
                            <p class="quote-text">${post.title}</p>
                            <p class="post-date">${post.date}</p>
                            <p class="quote-text post-body">${post.body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => {
                document.getElementById('posts').innerHTML = '<div class="quote-item"><span class="quote-number">—</span><p class="quote-text">No thoughts yet.</p></div>';
            });
    </script>
</body>
</html>
