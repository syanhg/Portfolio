<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - Seungyong (Alex) Yang</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        .post-body { margin-top: 8px; white-space: pre-wrap; }
        .post-date  { font-size: 12px; color: #bbb; margin-bottom: 4px; }

        .thoughts-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding: 0 2px;
        }

        .thoughts-header h1 {
            margin-bottom: 0;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-indicator,
        .year-filter {
            display: inline-flex;
            border: 1px solid #aaa;
        }

        .page-btn,
        .year-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 12px;
            font-family: inherit;
            transition: color 0.2s, background 0.2s;
            line-height: 1;
            min-width: 28px;
        }

        .page-btn + .page-btn,
        .year-btn + .year-btn {
            border-left: 1px solid #aaa;
        }

        .page-btn.active,
        .year-btn.active {
            color: #666;
            background: rgba(0,0,0,0.04);
        }

        .page-btn:hover:not(.active),
        .year-btn:hover:not(.active) {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="thoughts-header">
            <h1><a href="../home" class="h1-link">Seungyong (Alex) Yang</a></h1>
            <div class="header-controls">
                <div class="year-filter" id="year-filter"></div>
                <div class="page-indicator" id="page-indicator"></div>
            </div>
        </div>

        <div id="posts"></div>

        <div class="nav">
            <a href="../home"   class="nav-btn">home<span class="arrow">→</span></a>
            <a href="../quotes" class="nav-btn">quotes<span class="arrow">→</span></a>
            <a href="../photos" class="nav-btn">photos<span class="arrow">→</span></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://wzzyinimajfxuueywxdy.supabase.co',
            'sb_publishable_UxPaRgkX2R9XHsTbioEfRw_eqPN9azu'
        );

        const PER_PAGE = 4;
        let allPosts = [];
        let filteredPosts = [];
        let currentYear = 'all';

        function renderPage(page) {
            const el = document.getElementById('posts');
            const start = (page - 1) * PER_PAGE;
            const slice = filteredPosts.slice(start, start + PER_PAGE);

            el.innerHTML = slice.map((post, i) => `
                <div class="quote-item">
                    <span class="quote-number">${String(start + i + 1).padStart(2, '0')}</span>
                    <div>
                        <p class="quote-text">${post.body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
                        <p class="post-date">${post.date}</p>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.page-btn').forEach(btn => {
                btn.classList.toggle('active', Number(btn.dataset.page) === page);
            });
        }

        function renderIndicator(totalPages, activePage) {
            const indicator = document.getElementById('page-indicator');
            if (totalPages <= 1) {
                indicator.style.display = 'none';
                return;
            }
            indicator.style.display = '';
            indicator.innerHTML = Array.from({ length: totalPages }, (_, i) => {
                const p = i + 1;
                return `<button class="page-btn${p === activePage ? ' active' : ''}" data-page="${p}" onclick="renderPage(${p})">${p}</button>`;
            }).join('');
        }

        function applyFilter(year) {
            currentYear = year;
            filteredPosts = year === 'all'
                ? allPosts
                : allPosts.filter(p => p.date && p.date.startsWith(year));

            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.year === year);
            });

            const totalPages = Math.ceil(filteredPosts.length / PER_PAGE);
            renderIndicator(totalPages, 1);
            renderPage(1);
        }

        function renderYearFilter(years) {
            const filter = document.getElementById('year-filter');
            if (years.length <= 1) {
                filter.style.display = 'none';
                return;
            }
            filter.innerHTML = ['all', ...years].map(y =>
                `<button class="year-btn${y === 'all' ? ' active' : ''}" data-year="${y}" onclick="applyFilter('${y}')">${y}</button>`
            ).join('');
        }

        async function load() {
            const el = document.getElementById('posts');
            const { data: posts, error } = await sb
                .from('posts')
                .select('*')
                .order('date', { ascending: false });

            if (error || !posts?.length) {
                el.innerHTML = '<div class="quote-item"><span class="quote-number">—</span><p class="quote-text">No thoughts yet.</p></div>';
                document.getElementById('page-indicator').style.display = 'none';
                document.getElementById('year-filter').style.display = 'none';
                return;
            }

            allPosts = posts;
            filteredPosts = posts;

            const years = [...new Set(posts.map(p => p.date?.slice(0, 4)).filter(Boolean))].sort((a, b) => b - a);
            renderYearFilter(years);

            const totalPages = Math.ceil(allPosts.length / PER_PAGE);
            renderIndicator(totalPages, 1);
            renderPage(1);
        }

        load();
    </script>
    <script src="../nav.js"></script>
</body>
</html>
